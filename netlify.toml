[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200
  force = true

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/campaigns"
  to = "/.netlify/functions/campaigns"
  status = 200
  force = true

[[redirects]]
  from = "/api/metrics"
  to = "/.netlify/functions/metrics"
  status = 200
  force = true

[[redirects]]
  from = "/api/accounts"
  to = "/.netlify/functions/accounts"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
